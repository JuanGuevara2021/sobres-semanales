<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E9B5A"/>
      <stop offset="100%" stop-color="#054D2E"/>
    </linearGradient>
  </defs>
  <!-- fondo -->
  <rect width="1024" height="500" fill="url(#gbg)"/>
  <!-- patron decorativo de sobres -->
  <g opacity=".06" fill="#fff">
    <rect x="-40" y="320" width="120" height="80" rx="10" transform="rotate(-15)"/>
    <rect x="900" y="40" width="140" height="90" rx="12" transform="rotate(10,970,85)"/>
    <rect x="780" y="360" width="100" height="65" rx="8" transform="rotate(-8,830,392)"/>
    <rect x="60" y="30" width="90" height="60" rx="8" transform="rotate(12,105,60)"/>
  </g>
  <!-- icono sobre con moneda (version pequena) -->
  <g transform="translate(160,120) scale(0.5)">
    <rect x="0" y="40" width="320" height="210" rx="24" fill="#fff" opacity=".95"/>
    <path d="M0,64 L160,180 L320,64 L320,40 Q320,16 296,16 L24,16 Q0,16 0,40 Z" fill="#F0EEF8" opacity=".9"/>
    <path d="M0,40 L160,170 L320,40" fill="none" stroke="#0B7A4B" stroke-width="4" opacity=".3"/>
    <circle cx="244" cy="210" r="50" fill="#FFD54F" stroke="#FFC107" stroke-width="3"/>
    <text x="244" y="230" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="56" fill="#5D4037">$</text>
  </g>
  <!-- texto principal -->
  <text x="440" y="195" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="48" fill="#fff">Sobres</text>
  <text x="440" y="255" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="48" fill="#fff">Semanales</text>
  <!-- subtitulo -->
  <text x="440" y="310" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="22" fill="#A8F5C8">Controla tus gastos.</text>
  <text x="440" y="340" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="22" fill="#A8F5C8">Ahorra sin pensarlo.</text>
  <!-- 3 mini features -->
  <g transform="translate(440,380)" font-family="Arial,Helvetica,sans-serif" fill="#fff" opacity=".8">
    <circle cx="8" cy="-5" r="4" fill="#FFD54F"/>
    <text x="20" y="0" font-size="15" font-weight="600">Sobres de presupuesto</text>
    <circle cx="228" cy="-5" r="4" fill="#FFD54F"/>
    <text x="240" y="0" font-size="15" font-weight="600">Ahorro automatico</text>
    <circle cx="428" cy="-5" r="4" fill="#FFD54F"/>
    <text x="440" y="0" font-size="15" font-weight="600">Graficas</text>
  </g>
</svg>
