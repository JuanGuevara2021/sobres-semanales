<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0B7A4B"/>
  <g transform="translate(256,240)">
    <!-- sobre (envelope body) -->
    <rect x="-160" y="-80" width="320" height="190" rx="18" fill="#fff" opacity=".95"/>
    <!-- flap triangular -->
    <polygon points="-160,-80 0,50 160,-80" fill="#E0DEF0" opacity=".85"/>
    <!-- linea de cierre -->
    <line x1="-160" y1="-80" x2="0" y2="50" stroke="#0B7A4B" stroke-width="5" opacity=".4"/>
    <line x1="160" y1="-80" x2="0" y2="50" stroke="#0B7A4B" stroke-width="5" opacity=".4"/>
    <!-- simbolo $ -->
    <text x="0" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="80" fill="#0B7A4B" opacity=".7">$</text>
  </g>
</svg>
