<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E9B5A"/>
      <stop offset="100%" stop-color="#076B3E"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".15"/>
    </filter>
  </defs>
  <!-- fondo -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- sobre cuerpo -->
  <rect x="96" y="170" width="320" height="210" rx="24" fill="#fff" filter="url(#shadow)"/>
  <!-- flap del sobre -->
  <path d="M96,194 L256,310 L416,194 L416,170 Q416,146 392,146 L120,146 Q96,146 96,170 Z" fill="#F0EEF8"/>
  <!-- lineas del flap -->
  <path d="M96,170 L256,300 L416,170" fill="none" stroke="#0B7A4B" stroke-width="4" opacity=".3"/>
  <!-- moneda / circulo con $ -->
  <circle cx="340" cy="340" r="56" fill="#FFD54F" stroke="#FFC107" stroke-width="4" filter="url(#shadow)"/>
  <text x="340" y="362" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="64" fill="#5D4037">$</text>
</svg>
